        function renderAllProjects() {
            const container = document.getElementById('allProjectsGrid');
            if (!container) return;
            container.innerHTML = '';
            allProjects.forEach(proj => {
                const card = document.createElement('div');
                card.className = 'project-card group bg-black/40 border border-white/10 rounded-2xl overflow-hidden hover:border-white/30 transition duration-300 fade-up';
                card.innerHTML = `<img src="${proj.mainImage}" class="w-full h-52 object-cover transition duration-500" loading="lazy"><div class="p-4"><p class="text-gray-400 text-[11px] uppercase tracking-wider">${proj.type}</p><h3 class="text-lg font-light mt-1">${proj.title}</h3><p class="text-gray-400 text-xs mt-2 line-clamp-2">${proj.shortDesc}</p><div class="mt-3 text-xs border border-white/30 px-3 py-1.5 rounded-full inline-block hover:bg-white hover:text-black transition">查看详情</div></div>`;
                card.onclick = () => openProjectModal(proj);
                container.appendChild(card);
            });
        }

        // 打开项目详情模态框
        function openProjectModal(project) {
            const modal = document.getElementById('projectModal');
            const modalContent = document.getElementById('modalContent');
            const galleryHtml = project.galleryImages && project.galleryImages.length ? 
                `<div class="mb-5"><h4 class="text-white/70 text-xs uppercase tracking-wide mb-2">项目图集 (点击图片放大查看)</h4><div class="gallery-scroll">${project.galleryImages.map((img, i) => `<div class="gallery-item" onclick="openImageViewer('${img}', ${i}, project.galleryImages)"><img src="${img}" class="gallery-img" loading="lazy" alt="项目图"></div>`).join('')}</div><p class="text-gray-500 text-[10px] mt-2 text-center">← 滑动浏览 → 点击图片可放大缩放</p></div>` : '';
            modalContent.innerHTML = `<div class="grid md:grid-cols-5 gap-5"><div class="md:col-span-3"><img src="${project.mainImage}" class="w-full h-56 object-cover rounded-xl mb-3"><h2 class="text-xl font-light mb-1">${project.title}</h2><p class="text-gray-400 text-xs uppercase tracking-wider mb-3">${project.type}</p><div class="text-gray-300 space-y-3 text-xs md:text-sm"><p><strong class="text-white">◈ 完整描述</strong><br>${project.fullDesc}</p><p><strong class="text-white">◈ 设计概念</strong><br>${project.concept}</p><p><strong class="text-white">◈ 空间分析</strong><br>${project.analysis}</p></div></div><div class="md:col-span-2 space-y-4 bg-white/5 p-3 rounded-xl"><div><h4 class="text-white text-sm font-semibold">🛠️ 软件工具</h4><p class="text-gray-300 text-xs">${project.software}</p></div><div><h4 class="text-white text-sm font-semibold">📌 负责内容</h4><p class="text-gray-300 text-xs">${project.responsibility}</p></div><div class="border-t border-white/10 pt-2"><p class="text-gray-400 text-[11px] italic">⚡ 高效率工作流：标准化材质/灯光预设，快速输出高品质效果图。</p></div></div></div>${galleryHtml}`;
            modal.classList.remove('invisible', 'opacity-0');
            document.body.style.overflow = 'hidden';
            window.currentGallery = project.galleryImages;

        function closeModal() {
            const modal = document.getElementById('projectModal');
            modal.classList.add('invisible', 'opacity-0');
            document.body.style.overflow = '';
        }

        // 全屏图片查看器（与主页逻辑一致，简单版）
        let currentGalleryImgs = [];
        let currentImgIndex = 0;
        const viewer = document.getElementById('imageViewer');
        const viewerImg = document.getElementById('fullImg');
        window.openImageViewer = function(src, idx, galleryArr) {
            if (!src) return;
            currentGalleryImgs = galleryArr || [];
            currentImgIndex = idx || 0;
            viewerImg.src = src;
            viewer.classList.add('active');
            document.body.style.overflow = 'hidden';
        };
        function closeImageViewer() {
            viewer.classList.remove('active');
            document.body.style.overflow = '';
        }
        function nextImage() {
            if (currentGalleryImgs.length && currentImgIndex < currentGalleryImgs.length - 1) {
                currentImgIndex++;
                viewerImg.src = currentGalleryImgs[currentImgIndex];
            }
        }
        function prevImage() {
            if (currentGalleryImgs.length && currentImgIndex > 0) {
                currentImgIndex--;
                viewerImg.src = currentGalleryImgs[currentImgIndex];
            }
        }
        document.getElementById('viewerPrev').onclick = prevImage;
        document.getElementById('viewerNext').onclick = nextImage;
        document.getElementById('viewerClose').onclick = closeImageViewer;
        viewer.onclick = (e) => { if (e.target === viewer) closeImageViewer(); };

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('projectModal').addEventListener('click', (e) => { if (e.target === document.getElementById('projectModal')) closeModal(); });
        renderAllProjects();

        const fadeElements = document.querySelectorAll('.fade-up');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        fadeElements.forEach(el => observer.observe(el));
    </script>
</body>
</html>
